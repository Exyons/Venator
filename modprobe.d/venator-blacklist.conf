#
# wmbh-probe is a developer tool that competes with venator's
# gaming + lightbar half for the WMBH WMI GUID (7A4DDFE7-...). If both
# are loadable the first one to bind wins, which silently leaves the
# other half non-functional (no `gaming0`, no `lightbar0`).
#
# Blacklist auto-load so the system never pulls wmbh_probe in by
# accident — it can still be `insmod`'d manually for diagnostics.

blacklist wmbh_probe
blacklist wmbh-probe
